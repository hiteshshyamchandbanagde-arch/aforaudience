<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — AforAudience</title>
  <link rel="icon" href="/icon-192x192.png" type="image/png" />
  <meta name="theme-color" content="#C8441A" />
  <style>
    :root {
      --bg: #F7F3EE;
      --ink: #0E0C0A;
      --accent: #C8441A;
      --muted: #6B655F;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
                   sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .mark {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      border-radius: 18px;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mark svg { display: block; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      max-width: 20ch;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 36ch;
      margin: 0 0 24px;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: translateY(1px); }
    .tip {
      margin-top: 32px;
      font-size: 14px;
      color: var(--muted);
      max-width: 32ch;
    }
  </style>
</head>
<body>
  <div class="mark" aria-hidden="true">
    <svg width="44" height="44" viewBox="0 0 64 64">
      <path d="M18 18h28v8H18z" fill="#C8441A"/>
      <path d="M18 30h20v8H18z" fill="#C9973A"/>
      <path d="M18 42h14v8H18z" fill="#F7F3EE"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>No signal right now — but any tickets you've already opened are still saved for the door.</p>
  <button onclick="location.reload()">Try again</button>
  <p class="tip">Tip: open your tickets from the "My Tickets" screen — they'll show even without a connection once you've viewed them once.</p>
</body>
</html>
